name: Build AOD APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # manual trigger button bhi hoga

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Code checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java setup
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle cache — dobara download nahi hoga
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-

      # 4. Permission
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 5. Build Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      # 6. APK upload — Actions page pe download hogi
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AOD-App-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
